<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Badkamerrenovatie Antwerpen | Gratis plaatsbezoek + gedetailleerde offerte | Reno Rangers</title>
<meta name="description" content="Badkamer renoveren in Antwerpen? Start met een gratis plaatsbezoek. Wij bekijken uw badkamer ter plaatse en bezorgen u een gedetailleerde offerte met duidelijke planning."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{overflow-x:hidden;font-family:'Inter',sans-serif;background:#F5F5F5;}
::selection{background:#E6332930;color:#0A0A0A;}
a{text-decoration:none;}
img{display:block;max-width:100%;}

/* ── BRAND TOKENS ── */
:root{
  --red:#E63329;
  --black:#0A0A0A;
  --dark:#141414;
  --char:#2A2A2A;
  --gray:#777777;
  --ltGray:#E0E0E0;
  --off:#F5F5F5;
  --white:#FFFFFF;
  --bebas:'Bebas Neue',sans-serif;
  --inter:'Inter',sans-serif;
  --max:1320px;
}

/* ── MARQUEE ── */
@keyframes mL{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
@keyframes mR{0%{transform:translateX(-50%);}100%{transform:translateX(0);}}
.marquee-track{overflow:hidden;background:var(--red);padding:13px 0;white-space:nowrap;}
.marquee-inner{display:inline-flex;animation:mL 28s linear infinite;}
.marquee-inner.rev{animation:mR 28s linear infinite;}
.marquee-item{font-family:var(--bebas);font-size:15px;color:var(--white);letter-spacing:3px;padding:0 20px;}
.marquee-sep{opacity:0.4;}

/* ── REVEAL ANIMATION ── */
.reveal{opacity:0;transform:translateY(40px);transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1),transform 0.7s cubic-bezier(0.16,1,0.3,1);}
.reveal.visible{opacity:1;transform:none;}
.reveal[data-delay="1"]{transition-delay:0.08s;}
.reveal[data-delay="2"]{transition-delay:0.15s;}
.reveal[data-delay="3"]{transition-delay:0.22s;}
.reveal[data-delay="4"]{transition-delay:0.3s;}
.reveal[data-delay="5"]{transition-delay:0.38s;}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  background:rgba(10,10,10,0.88);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.05);
  transition:all 0.3s;
}
.nav.scrolled{background:rgba(10,10,10,0.97);}
.nav-inner{max-width:1320px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;height:70px;}
.nav-logo img{height:46px;width:auto;display:block;}
.nav-logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#ffffff;letter-spacing:2px;}
.nav-logo-text span{color:#E63329;}
/* desktop links — hidden on mobile */
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-link{background:none;border:none;cursor:pointer;padding:8px 13px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:rgba(255,255,255,0.6);transition:color 0.2s;text-decoration:none;display:inline-block;}
.nav-link:hover{color:#ffffff;}
.nav-cta-btn{background:#E63329;color:#ffffff;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;padding:10px 22px;margin-left:6px;transition:all 0.2s;text-decoration:none;display:inline-block;}
.nav-cta-btn:hover{background:#2A2A2A;}
/* hamburger */
.nav-burger{display:none;background:none;border:none;cursor:pointer;padding:8px;flex-direction:column;gap:5px;}
.nav-burger span{display:block;width:26px;height:2px;background:#ffffff;transition:all 0.3s;transform-origin:center;}
.nav-burger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.nav-burger.open span:nth-child(2){opacity:0;}
.nav-burger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
/* mobile dropdown */
.nav-mobile{display:none;background:#0A0A0A;padding:14px 24px 20px;flex-direction:column;gap:4px;border-top:1px solid rgba(255,255,255,0.05);}
.nav-mobile.open{display:flex;}
.nav-mobile a{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:rgba(255,255,255,0.75);text-decoration:none;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);transition:color 0.2s;}
.nav-mobile a:last-child{border-bottom:none;color:#E63329;margin-top:8px;font-size:20px;}
.nav-mobile a:hover{color:#ffffff;}
@media(max-width:768px){
  .nav-links{display:none;}
  .nav-burger{display:flex;}
}

/* ── BUTTON COMPONENT ── */
.btn{
  background:var(--red);color:var(--white);
  border:2px solid var(--red);
  cursor:pointer;font-family:var(--bebas);font-size:15px;letter-spacing:3px;
  padding:16px 36px;min-width:280px;text-align:center;
  transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none;
}
.btn:hover{background:var(--white);color:var(--black);border-color:var(--white);}
.btn-outline{background:transparent;color:var(--white);border:2px solid var(--white);}
.btn-outline:hover{color:var(--red);background:transparent;border-color:var(--red);}
